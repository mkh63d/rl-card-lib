name: CI

on:
  push:
    branches: [main, master, package-structure]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU wheels: the tests never touch a GPU and the CUDA wheels are ~2GB.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy gymnasium matplotlib tqdm pytest flake8

      - name: Lint
        run: flake8 packages tests

      - name: Root test suite
        run: pytest tests/ -q

      - name: Examples package tests
        run: pytest packages/examples/tests/ -q
