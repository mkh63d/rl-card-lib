[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rl-card-lib-visualizer"
version = "0.1.0"
description = "Visualization helpers for rl-card-lib (prepared for splitting)"
readme = "README.md"
license = {text = "MIT"}
authors = [
	{name = "Michał Hołyński", email = "mholynski@proton.me"}
]
requires-python = ">=3.9"
dependencies = [
	"matplotlib>=3.5.0",
]

[tool.setuptools.packages.find]
where = ["src"]

