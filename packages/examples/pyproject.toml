[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rl-card-lib-examples"
version = "0.1.0"
description = "Example scripts and notebooks for rl-card-lib"
readme = "README.md"
license = {text = "MIT"}
authors = [
	{name = "Michał Hołyński", email = "mholynski@proton.me"}
]
requires-python = ">=3.9"

[tool.setuptools.packages.find]
where = ["."]

