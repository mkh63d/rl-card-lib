[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rl-card-lib-core"
version = "0.1.0"
description = "Core utilities for rl-card-lib (prepared for splitting into separate package)"
readme = "README.md"
license = {text = "MIT"}
authors = [
	{name = "Michał Hołyński", email = "mholynski@proton.me"}
]
requires-python = ">=3.9"
dependencies = [
	"numpy>=1.21.0",
]

[tool.setuptools.packages.find]
where = ["src"]

